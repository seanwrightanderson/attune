[phases.setup]
nixPkgs = ["python311", "gcc"]

[phases.install]
cmds = [
  "curl -sS https://bootstrap.pypa.io/get-pip.py | python3.11 - --break-system-packages",
  "python3.11 -m pip install --break-system-packages -r backend/requirements.txt"
]

[start]
cmd = "cd backend && python3.11 -m uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1 --no-access-log"
